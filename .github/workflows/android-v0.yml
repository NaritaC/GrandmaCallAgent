name: Android V0

"on":
  push:
    paths:
      - "GrandmaBridge/**"
      - ".github/workflows/android-v0.yml"
  pull_request:
    paths:
      - "GrandmaBridge/**"
      - ".github/workflows/android-v0.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-v0-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: GrandmaBridge

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK 35
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"
          log-accepted-android-sdk-licenses: false

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"
          cache-provider: basic

      - name: Run unit tests and build debug APK
        shell: bash
        run: |
          set +e
          gradle --no-daemon --stacktrace :app:testDebugUnitTest :app:assembleDebug 2>&1 | tee android-v0-build.log
          status=${PIPESTATUS[0]}
          if [[ $status -ne 0 ]]; then
            {
              echo "### Android V0 build failure"
              echo '```text'
              tail -n 120 android-v0-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            details=$(tail -n 60 android-v0-build.log)
            details=${details//'%'/'%25'}
            details=${details//$'\r'/'%0D'}
            details=${details//$'\n'/'%0A'}
            echo "::error title=Android V0 build failed::$details"
            exit "$status"
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-v0-build-log
          path: GrandmaBridge/android-v0-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-v0-unit-test-report
          path: GrandmaBridge/app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: GrandmaBridge-debug
          path: GrandmaBridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
