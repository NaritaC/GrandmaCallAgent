name: Android V0

"on":
  push:
    paths:
      - "GrandmaBridge/**"
      - "scripts/v0_verify_apk_safety.ps1"
      - ".github/workflows/android-v0.yml"
  pull_request:
    paths:
      - "GrandmaBridge/**"
      - "scripts/v0_verify_apk_safety.ps1"
      - ".github/workflows/android-v0.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-v0-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: GrandmaBridge

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK 35
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"
          log-accepted-android-sdk-licenses: false

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run unit tests, lint, and build debug APK
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --console=plain :app:testDebugUnitTest :app:lintDebug :app:assembleDebug 2>&1 | tee android-v0-build.log
          status=${PIPESTATUS[0]}
          if [[ $status -ne 0 ]]; then
            {
              echo "### Android V0 build failure"
              echo '```text'
              grep -n -E -B 2 -A 12 '(^e: |^error:|FAILURE:|^\* What went wrong:|Execution failed for task|Could not (resolve|determine)|A problem occurred|Caused by:)' android-v0-build.log || true
              echo
              echo "Final Gradle output:"
              tail -n 80 android-v0-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            details=$(
              {
                grep -n -E -B 2 -A 12 '(^e: |^error:|FAILURE:|^\* What went wrong:|Execution failed for task|Could not (resolve|determine)|A problem occurred|Caused by:)' android-v0-build.log || true
                echo
                echo "Final Gradle output:"
                tail -n 40 android-v0-build.log
              } | tail -n 120
            )
            details=${details//'%'/'%25'}
            details=${details//$'\r'/'%0D'}
            details=${details//$'\n'/'%0A'}
            echo "::error title=Android V0 build failed::$details"
            exit "$status"
          fi

      - name: Verify packaged V0-A safety boundaries
        shell: pwsh
        run: |
          $aapt2 = Join-Path $env:ANDROID_HOME "build-tools/35.0.0/aapt2"
          ../scripts/v0_verify_apk_safety.ps1 `
            -ApkPath "app/build/outputs/apk/debug/app-debug.apk" `
            -Aapt2Path $aapt2

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-v0-build-log
          path: GrandmaBridge/android-v0-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-v0-unit-test-report
          path: GrandmaBridge/app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-v0-lint-report
          path: GrandmaBridge/app/build/reports/lint-results-debug.html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: GrandmaBridge-debug
          path: GrandmaBridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
